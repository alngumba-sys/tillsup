<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    
    <!-- ============================================ -->
    <!-- NUCLEAR OPTION - SILENCE ALL FETCH ERRORS -->
    <!-- ============================================ -->
    <script>
      // NUCLEAR SUPPRESSION - MOST AGGRESSIVE POSSIBLE
      (function() {
        'use strict';
        
        // Save originals
        const _error = console.error;
        const _warn = console.warn;
        const _log = console.log;
        
        window.__suppressedCount = 0;
        window.__suppressionActive = true;
        
        // ULTRA-AGGRESSIVE DETECTION
        function shouldSuppress(args) {
          try {
            const combined = args.map(a => {
              if (!a) return '';
              if (typeof a === 'string') return a;
              if (a.stack) return a.stack;
              if (a.message) return a.message;
              try { return JSON.stringify(a); } catch { return String(a); }
            }).join(' ').toLowerCase();
            
            // Suppress anything related to Figma platform
            return combined.includes('devtools_worker') ||
                   combined.includes('figma.com') ||
                   combined.includes('webpack-artifacts') ||
                   (combined.includes('failed to fetch') && 
                    (combined.includes('figma') || combined.includes('devtools'))) ||
                   combined.includes('7f68a886400dcd44');
          } catch {
            return false;
          }
        }
        
        // Override ALL console methods
        console.error = function(...args) {
          if (shouldSuppress(args)) {
            window.__suppressedCount++;
            return;
          }
          _error.apply(console, args);
        };
        
        console.warn = function(...args) {
          if (shouldSuppress(args)) {
            window.__suppressedCount++;
            return;
          }
          _warn.apply(console, args);
        };
        
        console.log = function(...args) {
          if (shouldSuppress(args)) {
            window.__suppressedCount++;
            return;
          }
          _log.apply(console, args);
        };
        
        // Override window.onerror
        window.onerror = function(msg, url, line, col, error) {
          const message = String(msg).toLowerCase();
          const source = String(url).toLowerCase();
          
          if (source.includes('figma.com') || 
              source.includes('devtools_worker') ||
              (message.includes('failed to fetch') && source.includes('figma'))) {
            window.__suppressedCount++;
            return true; // Prevent default browser error handling
          }
          return false;
        };
        
        // Capture ALL error events - EARLIEST PHASE
        window.addEventListener('error', function(e) {
          const src = (e.filename || '').toLowerCase();
          const msg = (e.message || '').toLowerCase();
          
          if (src.includes('figma.com') || 
              src.includes('devtools_worker') ||
              src.includes('webpack-artifacts') ||
              msg.includes('devtools_worker') ||
              (msg.includes('failed to fetch') && src.includes('figma'))) {
            window.__suppressedCount++;
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            return true;
          }
        }, true);
        
        // Capture ALL unhandled rejections - EARLIEST PHASE
        window.addEventListener('unhandledrejection', function(e) {
          try {
            const reason = e.reason;
            const stack = (reason?.stack || String(reason)).toLowerCase();
            
            if (stack.includes('figma.com') ||
                stack.includes('devtools_worker') ||
                stack.includes('webpack-artifacts') ||
                stack.includes('7f68a886400dcd44')) {
              window.__suppressedCount++;
              e.preventDefault();
              e.stopPropagation();
              e.stopImmediatePropagation();
            }
          } catch {}
        }, true);
        
        // Success message
        _log.call(console, '%c🛡️ NUCLEAR SUPPRESSION ACTIVE', 'background:#dc2626;color:white;padding:8px 16px;font-weight:bold;font-size:16px');
        _log.call(console, '%c   ALL Figma platform errors will be INVISIBLE', 'color:#dc2626;font-weight:bold');
        _log.call(console, `%c   Suppression check: window.__suppressionActive = ${window.__suppressionActive}`, 'color:#10b981');
      })();
    </script>
    
    <link rel="icon" type="image/x-icon" id="dynamic-favicon" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Tillsup - Modern POS System</title>
    
    <style>
      /* Ensure body and html have proper sizing */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
      }
      
      /* Loading fallback - NO GRADIENTS, solid Tillsup blue */
      #root:empty::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        width: 100%;
        background: #1ba0ba;
        z-index: 9999;
      }
      
      #root:empty::after {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100px;
        height: 30px;
        z-index: 10000;
      }

      /* Loader Animation */
      .loader-spanne-20 {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100px;
        height: 30px;
        padding: 0;
        z-index: 10001;
      }
      .loader-spanne-20 > span {
        position: absolute;
        right: 0;
        width: 3px;
        height: 30px;
        background-color: white;
        display: block;
        border-radius: 3px;
        transform-origin: 50% 100%;
        animation: move 2.8s linear infinite;
      }
      .loader-spanne-20 > span:nth-child(1) {
        animation-delay: -0.4s;
      }
      .loader-spanne-20 > span:nth-child(2) {
        animation-delay: -0.8s;
      }
      .loader-spanne-20 > span:nth-child(3) {
        animation-delay: -1.2s;
      }
      .loader-spanne-20 > span:nth-child(4) {
        animation-delay: -1.6s;
      }
      .loader-spanne-20 > span:nth-child(5) {
        animation-delay: -2s;
      }
      .loader-spanne-20 > span:nth-child(6) {
        animation-delay: -2.4s;
      }
      .loader-spanne-20 > span:nth-child(7) {
        animation-delay: -2.8s;
      }
      @keyframes move {
        0% {
          opacity: 0;
          transform: translateX(0px) rotate(0deg);
        }
        20% {
          opacity: 1;
        }
        40% {
          transform: translateX(-40px) rotate(0deg);
        }
        50% {
          opacity: 1;
          transform: translateX(-50px) rotate(22deg);
        }
        85% {
          opacity: 1;
          transform: translateX(-85px) rotate(60deg);
        }
        100% {
          opacity: 0;
          transform: translateX(-100px) rotate(65deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Loader HTML for initial page load -->
    <div class="loader-spanne-20" id="initial-loader">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove loader when React app loads - AGGRESSIVE REMOVAL
      window.addEventListener('DOMContentLoaded', function() {
        // Remove immediately
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.display = 'none';
        }
      });
      
      // Also remove after a maximum of 2 seconds as a safety
      setTimeout(function() {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.display = 'none';
          console.log('⚠️ Loader forcibly removed after 2s timeout');
        }
      }, 2000);
      
      // Watch for any React rendering
      const observer = new MutationObserver(function(mutations) {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.display = 'none';
            console.log('✅ Loader removed - React content detected');
          }
          observer.disconnect();
        }
      });
      
      observer.observe(document.getElementById('root'), {
        childList: true,
        subtree: false
      });
    </script>
  </body>
</html>
