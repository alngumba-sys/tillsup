<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Tillsup - Modern POS System</title>
    <style>
      /* Ensure body and html have proper sizing */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100vh;
      }
      
      /* Loading fallback - NO GRADIENTS, solid Tillsup blue */
      #root:empty::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        width: 100%;
        background: #1ba0ba;
        z-index: 9999;
      }
      
      #root:empty::after {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100px;
        height: 30px;
        z-index: 10000;
      }

      /* Loader Animation */
      .loader-spanne-20 {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100px;
        height: 30px;
        padding: 0;
        z-index: 10001;
      }
      .loader-spanne-20 > span {
        position: absolute;
        right: 0;
        width: 3px;
        height: 30px;
        background-color: white;
        display: block;
        border-radius: 3px;
        transform-origin: 50% 100%;
        animation: move 2.8s linear infinite;
      }
      .loader-spanne-20 > span:nth-child(1) {
        animation-delay: -0.4s;
      }
      .loader-spanne-20 > span:nth-child(2) {
        animation-delay: -0.8s;
      }
      .loader-spanne-20 > span:nth-child(3) {
        animation-delay: -1.2s;
      }
      .loader-spanne-20 > span:nth-child(4) {
        animation-delay: -1.6s;
      }
      .loader-spanne-20 > span:nth-child(5) {
        animation-delay: -2s;
      }
      .loader-spanne-20 > span:nth-child(6) {
        animation-delay: -2.4s;
      }
      .loader-spanne-20 > span:nth-child(7) {
        animation-delay: -2.8s;
      }
      @keyframes move {
        0% {
          opacity: 0;
          transform: translateX(0px) rotate(0deg);
        }
        20% {
          opacity: 1;
        }
        40% {
          transform: translateX(-40px) rotate(0deg);
        }
        50% {
          opacity: 1;
          transform: translateX(-50px) rotate(22deg);
        }
        85% {
          opacity: 1;
          transform: translateX(-85px) rotate(60deg);
        }
        100% {
          opacity: 0;
          transform: translateX(-100px) rotate(65deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Loader HTML for initial page load -->
    <div class="loader-spanne-20" id="initial-loader">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove loader when React app loads
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.display = 'none';
          }
        }, 100);
      });
    </script>
  </body>
</html>
