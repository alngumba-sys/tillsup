<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 130" role="img" aria-label="tillsup">
  <defs>
    <style>
      .tillsup-wordmark {
        font-family: "Nunito", "Mulish", "SF Pro Rounded", system-ui, -apple-system, "Segoe UI", sans-serif;
        font-weight: 900;
        font-size: 96px;
        letter-spacing: -3px;
      }
    </style>
  </defs>

  <!-- Small floating red dot above icon -->
  <circle cx="36" cy="12" r="10" fill="#EF4444"/>

  <!-- Red rounded-square icon body -->
  <rect x="8" y="28" width="104" height="102" rx="22" fill="#EF4444"/>

  <!-- White radiating lines on top (activity burst) -->
  <g stroke="#FFFFFF" stroke-width="7" stroke-linecap="round">
    <line x1="60" y1="70" x2="60" y2="52"/>
    <line x1="40" y1="74" x2="30" y2="60"/>
    <line x1="80" y1="74" x2="90" y2="60"/>
  </g>

  <!-- White smile curve -->
  <path d="M 32 92 Q 60 118 88 92" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- White wheels at bottom -->
  <circle cx="42" cy="118" r="6" fill="#FFFFFF"/>
  <circle cx="78" cy="118" r="6" fill="#FFFFFF"/>

  <!-- Wordmark "tillsup" -->
  <text x="130" y="112" class="tillsup-wordmark" fill="#00ADC8">tillsup</text>

  <!-- Red dot on the "i" -->
  <circle cx="172" cy="40" r="9" fill="#EF4444"/>
</svg>
